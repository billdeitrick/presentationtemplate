<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Outline</title>
	<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
	<style>
		body {
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
			font-size: 16px;
			line-height: 1.6;
			color: #24292e;
			max-width: 800px;
			margin: 0 auto;
			padding: 40px 24px;
		}
		h1, h2, h3, h4 { line-height: 1.25; margin-top: 24px; margin-bottom: 8px; }
		h1 { font-size: 2em; border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; }
		h2 { font-size: 1.5em; border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; }
		ul, ol { padding-left: 2em; }
		li { margin: 4px 0; }
		code { background: #f6f8fa; padding: 2px 6px; border-radius: 3px; font-size: 0.9em; }
		pre { background: #f6f8fa; padding: 16px; border-radius: 6px; overflow: auto; }
		blockquote { border-left: 4px solid #dfe2e5; margin: 0; padding: 0 16px; color: #6a737d; }
		hr { border: none; border-top: 1px solid #eaecef; margin: 24px 0; }
		mark { background: #fff3b0; padding: 1px 3px; border-radius: 2px; }
		mark.blue { background: #c8e6ff; }
		mark.green { background: #c8f5d0; }
	</style>
</head>
<body>
	<div id="content"></div>
	<script>
		async function loadOutline() {
			const response = await fetch('outline.md?nocache=' + Date.now());
			const text = await response.text();
			const highlighted = text
				.replace(/==(blue):(.+?)==/g, '<mark class="blue">$2</mark>')
				.replace(/==(green):(.+?)==/g, '<mark class="green">$2</mark>')
				.replace(/==(.+?)==/g, '<mark>$1</mark>');
			document.getElementById('content').innerHTML = marked.parse(highlighted);
		}

		loadOutline();

		// Re-fetch when live-server triggers a reload
		window.addEventListener('message', (e) => {
			if (e.data === 'reload') loadOutline();
		});
	</script>
</body>
</html>
