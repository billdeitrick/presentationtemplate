<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Presentation</title>
	<style>
		*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

		body {
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
			background: #0f0f0f;
			color: #fff;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.container {
			text-align: center;
			padding: 40px 24px;
		}

		h1 {
			font-size: 2.5rem;
			font-weight: 700;
			letter-spacing: -0.5px;
			margin-bottom: 8px;
		}

		p {
			color: #888;
			font-size: 1rem;
			margin-bottom: 48px;
		}

		.cards {
			display: flex;
			gap: 20px;
			justify-content: center;
			flex-wrap: wrap;
		}

		a.card {
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			gap: 16px;
			width: 200px;
			height: 180px;
			background: #1a1a1a;
			border: 1px solid #2a2a2a;
			border-radius: 12px;
			text-decoration: none;
			color: #fff;
			transition: background 0.15s, border-color 0.15s, transform 0.15s;
		}

		a.card:hover {
			background: #222;
			border-color: #444;
			transform: translateY(-2px);
		}

		.card-icon {
			font-size: 2.5rem;
		}

		.card-label {
			font-size: 1rem;
			font-weight: 600;
		}

		.card-desc {
			font-size: 0.8rem;
			color: #666;
		}
	</style>
</head>
<body>
	<div class="container">
		<h1>Presentation</h1>
		<p>What would you like to open?</p>
		<div class="cards">
			<a class="card" href="slides/index.html">
				<div class="card-icon">▶</div>
				<div class="card-label">Slides</div>
				<div class="card-desc">View presentation</div>
			</a>
			<a class="card" href="outline.html">
				<div class="card-icon">📋</div>
				<div class="card-label">Outline</div>
				<div class="card-desc">Brainstorm &amp; structure</div>
			</a>
		</div>
	</div>
</body>
</html>
