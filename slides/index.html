<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presentation</title>

  <!-- Reveal.js core (local) -->
  <link rel="stylesheet" href="../node_modules/reveal.js/dist/reset.css">
  <link rel="stylesheet" href="../node_modules/reveal.js/dist/reveal.css">

  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Custom styles -->
  <link rel="stylesheet" href="styles.css">

  <!-- Chart.js for data visualization -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Mermaid for diagrams -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
</head>
<body>
  <div class="reveal">
    <div class="slides">

      <section id="title" class="section-divider" data-state="is-section-divider">
        <h1>Presentation Title</h1>
      </section>

      <section id="slide-2">
        <h2>Slide Title Here</h2>
        <div class="content">

        </div>
      </section>

      <section id="slide-3">
        <h2>Slide Title Here</h2>
        <div class="content">

        </div>
      </section>

    </div>
  </div>

  <script src="../node_modules/reveal.js/dist/reveal.js"></script>
  <script src="../node_modules/reveal.js/dist/plugin/markdown.js"></script>
  <script src="../node_modules/reveal.js/dist/plugin/highlight.js"></script>
  <script src="../node_modules/reveal.js/dist/plugin/notes.js"></script>
  <script src="../node_modules/reveal.js/dist/plugin/search.js"></script>
  <script src="../node_modules/reveal.js/dist/plugin/zoom.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js-plugins@latest/chart/plugin.js"></script>
  <script>
    Reveal.initialize({
      width: 1280,
      height: 720,
      margin: 0,
      controls: true,
      controlsTutorial: false,
      progress: false,
      slideNumber: false,
      hash: true,
      transition: 'slide',
      center: false,
      plugins: [ RevealMarkdown, RevealHighlight, RevealNotes, RevealSearch, RevealZoom, RevealChart ],
      pdfSeparateFragments: false,
      chart: {
        defaults: Object.assign({
          color: 'rgba(0, 0, 0, 0.8)',
          borderColor: 'rgba(0, 0, 0, 0.8)',
          devicePixelRatio: 2
        }, window.location.search.includes('export') ? { animation: false } : {})
      }
    });

    // Mermaid diagram rendering
    mermaid.initialize({ startOnLoad: false, theme: 'default' });
    const renderMermaid = () => {
      const slide = Reveal.getCurrentSlide();
      if (slide) mermaid.run({ nodes: slide.querySelectorAll('pre.mermaid') });
    };
    Reveal.on('ready', renderMermaid);
    Reveal.on('slidechanged', renderMermaid);

    // Auto-hide cursor after 3 seconds of inactivity
    let cursorTimer;
    document.addEventListener('mousemove', () => {
      document.body.style.cursor = 'default';
      clearTimeout(cursorTimer);
      cursorTimer = setTimeout(() => {
        document.body.style.cursor = 'none';
      }, 3000);
    });
  </script>
</body>
</html>
